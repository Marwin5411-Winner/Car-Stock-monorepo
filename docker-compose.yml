version: '3.8'

services:
  # PostgreSQL Database - No external port exposed, only accessible within network
  postgres:
    image: postgres:16-alpine
    container_name: car-stock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-car_stock}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - car-stock-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: car-stock-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    # Run Prisma Generate
    command: ["sh", "./apps/api/docker-entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-car_stock}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
      UPDATER_URL: http://updater:9000
      UPDATE_SECRET: ${UPDATE_SECRET:-}
    volumes:
      - updater_status:/app/updater-status:ro
    networks:
      - car-stock-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: car-stock-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - car-stock-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # System Updater Sidecar - manages git pull, rebuild, backup, rollback
  updater:
    build:
      context: .
      dockerfile: apps/updater/Dockerfile
    container_name: car-stock-updater
    restart: unless-stopped
    environment:
      PROJECT_PATH: /app/project
      UPDATE_BRANCH: ${UPDATE_BRANCH:-main}
      UPDATE_SECRET: ${UPDATE_SECRET:-}
      UPDATER_PORT: 9000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-car_stock}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECT_PATH:-.}:/app/project
      - updater_backups:/app/backups
      - updater_status:/app/status
      - updater_logs:/app/logs
    networks:
      - car-stock-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: car-stock-gotenberg
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - car-stock-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  car-stock-network:
    driver: bridge

volumes:
  postgres_data:
  updater_backups:
  updater_status:
  updater_logs:
