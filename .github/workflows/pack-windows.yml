# Build complete portable Windows package (cross-compile + engines + bun.exe)
# on version tags and manual dispatch.

name: Pack Windows portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pack Windows package
        run: bash scripts/pack-windows.sh --zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vbeyond-windows-package
          path: |
            dist/vbeyond-windows-v*.zip
            dist/vbeyond-windows-v*.zip.sha256
            dist/feed-*.json
          if-no-files-found: error

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vbeyond-windows-v*.zip
            dist/vbeyond-windows-v*.zip.sha256
            dist/feed-*.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
