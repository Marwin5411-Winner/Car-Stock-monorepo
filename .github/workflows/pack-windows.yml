# Build complete portable Windows package (cross-compile + engines + bun.exe)
# on version tags and manual dispatch.

name: Pack Windows portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pack Windows package
        run: bash scripts/pack-windows.sh --zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vbeyond-windows-package
          path: |
            dist/vbeyond-windows-v*.zip
            dist/vbeyond-windows-v*.zip.sha256
            dist/feed-*.json
          if-no-files-found: error

      # Deliberately does NOT attach to the GitHub Release. scripts/release.sh --publish is
      # the single publisher: it uploads the zip it just built and tested. CI building a
      # second, byte-different zip for the same tag meant the published sha256 could belong
      # to the other build — every customer update then aborted with "SHA256 mismatch".
      # This job stays as a build check; its artifact is for inspection only.
